# Group-stage tiebreakers in official FIFA 2026 order. NOTE: the Monte-Carlo ranker
# (worldcup.simulation.tiebreakers.rank_group) currently applies the PRIMARY criteria
# only -- points -> goal_difference -> goals_for -> drawing_of_lots. The head-to-head
# and fair-play steps are listed here for fidelity but are NOT yet implemented (TODO);
# a tie still level after goals_for falls straight through to a seeded random draw.
tiebreakers:
  - points
  - goal_difference
  - goals_for
  - head_to_head_points
  - head_to_head_goal_difference
  - head_to_head_goals_for
  - fair_play_points
  - drawing_of_lots

# Knockout bracket mapping.
# TODO(configurable, slice 6): the exact Round-of-32 pairings -- in particular
# which group's third-placed team each group winner faces -- follow a FIFA lookup
# table that depends on WHICH four of the twelve thirds qualify. Rather than
# assert an unverified bracket, the certain qualifier slots are listed and the
# pairings are left empty for the simulator to fill from a configurable mapping.
knockout_bracket:
  draw_status: placeholder
  # Slot tokens: '1X' = winner of group X, '2X' = runner-up of group X,
  # '3-n' = the n-th best third-placed qualifier (source group decided by lookup).
  qualifier_slots:
    group_winners: [1A, 1B, 1C, 1D, 1E, 1F, 1G, 1H, 1I, 1J, 1K, 1L]
    runners_up: [2A, 2B, 2C, 2D, 2E, 2F, 2G, 2H, 2I, 2J, 2K, 2L]
    best_third_placed: [3-1, 3-2, 3-3, 3-4, 3-5, 3-6, 3-7, 3-8]
  # Each entry (once filled): {match: <int>, home: <slot>, away: <slot>}.
  round_of_32: []
