# Maps alternate / historical team names to a single CANONICAL name, so the same
# nation does not split across rows when joining sources (results.csv vs FIFA
# ranking vs Elo). Canonical form = the spelling used in results.csv (martj42),
# which is already clean English. Consumed by worldcup.data.team_names.
#
# Matching is case-, accent-, and apostrophe-insensitive, so "Côte d'Ivoire",
# "Côte d’Ivoire", and "cote d'ivoire" all resolve through one entry below.
#
# DELIBERATELY NOT MAPPED:
#   * UK Home Nations — England, Scotland, Wales, Northern Ireland — are SEPARATE
#     teams. "Great Britain" / "United Kingdom" are not mapped to any of them.
#   * Defunct sides (Yugoslavia, Czechoslovakia, German DR, Soviet Union, Serbia
#     and Montenegro) are kept distinct from their successor nations.

aliases:
  # --- North & Central America ---
  "USA": "United States"
  "United States of America": "United States"

  # --- Europe ---
  "Czechia": "Czech Republic"
  "Türkiye": "Turkey"
  "Turkiye": "Turkey"
  "Holland": "Netherlands"
  "Ireland": "Republic of Ireland"        # results.csv canonical is "Republic of Ireland"
  "Eire": "Republic of Ireland"
  "Bosnia-Herzegovina": "Bosnia and Herzegovina"
  "Bosnia & Herzegovina": "Bosnia and Herzegovina"
  "Bosnia": "Bosnia and Herzegovina"
  "Macedonia": "North Macedonia"
  "FYR Macedonia": "North Macedonia"

  # --- Asia ---
  "Korea Republic": "South Korea"
  "Republic of Korea": "South Korea"
  "Korea DPR": "North Korea"
  "Korea, DPR": "North Korea"
  "IR Iran": "Iran"
  "China PR": "China"
  "Saudi": "Saudi Arabia"

  # --- Africa ---
  "Côte d'Ivoire": "Ivory Coast"
  "Cote d'Ivoire": "Ivory Coast"
  "Congo DR": "DR Congo"
  "Democratic Republic of the Congo": "DR Congo"
  "Cape Verde Islands": "Cape Verde"
  "Cabo Verde": "Cape Verde"
  "Swaziland": "Eswatini"

# TODO(V1.1): expand when the FIFA ranking dataset is added — run
# `find_unknown_teams` against the results.csv canonical set to surface gaps.
