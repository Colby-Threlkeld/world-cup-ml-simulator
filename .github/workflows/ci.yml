name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create environment
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"

      # CI runs only on the committed fixture data under tests/fixtures/ — the
      # production datasets in data/ are gitignored and never required.
      - name: Lint (ruff)
        run: uv run ruff check src tests scripts app

      - name: Format check (black)
        run: uv run black --check src tests scripts app

      - name: Test
        run: uv run pytest
