# 2026 FIFA World Cup format (USA / Canada / Mexico).
# Structural facts only -- NO predictions and NO unconfirmed group draws.
#
# draw_status: 'placeholder' means the 48 team slots below (A1..L4) are generic
# placeholders, NOT a claimed official draw. Replace each slot with the real
# qualified team once the draw is applied; the round-robin FIXTURES stay valid
# because a 4-team group schedule is identical no matter who fills the slots.
draw_status: placeholder

format:
  total_teams: 48
  num_groups: 12
  teams_per_group: 4
  # Advancement: top two of each group (24) + the 8 best third-placed teams = 32.
  advance_per_group: 2
  best_third_placed_advance: 8
  knockout_rounds:
    - round_of_32
    - round_of_16
    - quarter_final
    - semi_final
    - final

# Host nations qualify automatically and will occupy confirmed slots when the
# official draw is applied. Listed here as metadata, not yet placed in a group.
hosts:
  - United States
  - Canada
  - Mexico

# 12 groups (A-L) of 4 placeholder slots each = 48 unique team slots.
groups:
  A: [A1, A2, A3, A4]
  B: [B1, B2, B3, B4]
  C: [C1, C2, C3, C4]
  D: [D1, D2, D3, D4]
  E: [E1, E2, E3, E4]
  F: [F1, F2, F3, F4]
  G: [G1, G2, G3, G4]
  H: [H1, H2, H3, H4]
  I: [I1, I2, I3, I4]
  J: [J1, J2, J3, J4]
  K: [K1, K2, K3, K4]
  L: [L1, L2, L3, L4]

# Group-stage fixtures: the single round robin within each group (6 matches per
# group, every team plays 3). Structurally certain regardless of the draw.
fixtures:
  - {group: A, matchday: 1, home: A1, away: A2}
  - {group: A, matchday: 1, home: A3, away: A4}
  - {group: A, matchday: 2, home: A1, away: A3}
  - {group: A, matchday: 2, home: A4, away: A2}
